spec_version: 1
name: neongrid_env
description: "NeonGrid AI Energy Architect — manage a futuristic city's energy grid."
type: space
runtime: fastapi
app: server.app:app
port: 8000
tasks:
  - id: tutorial
    name: "Tutorial"
    description: "Basic grid stabilization. High solar, low demand."
    difficulty: easy
    grader: "tasks.tutorial.grader:grade"
  - id: easy
    name: "Bright Day"
    description: "Bright day with low grid prices. Focus on efficiency."
    difficulty: easy
    grader: "tasks.easy.grader:grade"
  - id: medium
    name: "Evening Peak"
    description: "Evening peak transition with cloudy weather. Manage battery carefully."
    difficulty: medium
    grader: "tasks.medium.grader:grade"
  - id: hard
    name: "Storm Surge"
    description: "Stormy conditions during high-demand peak. Minimize grid dependency."
    difficulty: hard
    grader: "tasks.hard.grader:grade"
  - id: extreme
    name: "Extreme Condition"
    description: "Catastrophic failure mitigation. Prevent total blackout."
    difficulty: hard
    grader: "tasks.extreme.grader:grade"
